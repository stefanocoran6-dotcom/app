<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>FinLearn · CFA Prep</title>

  <!-- PWA / iOS -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0b1322" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FinLearn" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" href="icon-192.png" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Moduli ES: react, react-dom e lucide-react risolti da esm.sh -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?deps=react@18.3.1",
      "lucide-react": "https://esm.sh/lucide-react@0.263.1?deps=react@18.3.1"
    }
  }
  </script>

  <style>
    html, body { margin: 0; padding: 0; background: #0b1322; }
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom);
           overscroll-behavior-y: none; -webkit-user-select: none; user-select: none;
           -webkit-touch-callout: none; touch-action: manipulation;
           -webkit-tap-highlight-color: transparent; -webkit-font-smoothing: antialiased; }
    input, textarea { -webkit-user-select: text; user-select: text; }
    #boot { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #f5d061; font-family: system-ui; gap: 12px; }
    #boot .spin { width: 34px; height: 34px; border: 3px solid #f5d06133; border-top-color: #f5d061;
                  border-radius: 50%; animation: sp 0.9s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"><div id="boot"><div class="spin"></div><div style="font-weight:700;font-size:14px">FinLearn</div></div></div>
  <script type="module" src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
